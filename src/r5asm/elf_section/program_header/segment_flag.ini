; Basic Permissions
SEGMENT_FLAG_EXECUTE=0x1            ; PF_X - Execute permission
SEGMENT_FLAG_WRITE=0x2              ; PF_W - Write permission
SEGMENT_FLAG_READ=0x4               ; PF_R - Read permission

; Combined Permission Flags
SEGMENT_FLAG_READ_EXECUTE=0x5       ; PF_R | PF_X - Read + Execute (Code segments)
SEGMENT_FLAG_READ_WRITE=0x6         ; PF_R | PF_W - Read + Write (Data segments)
SEGMENT_FLAG_READ_WRITE_EXECUTE=0x7 ; PF_R | PF_W | PF_X - All permissions

; GNU-specific Flags
SEGMENT_FLAG_MASKOS=0x0ff00000      ; Mask for OS-specific flags
SEGMENT_FLAG_MASKPROC=0xf0000000    ; Mask for processor-specific flags