; Marks end of the dynamic array
DT_NULL = 0
; Offset into .dynstr of a needed library name (e.g., "libc.so.6")
DT_NEEDED = 1
; Size (in bytes) of the relocation entries associated with the PLT
DT_PLTRELSZ = 2
; Address of the Global Offset Table (GOT)
DT_PLTGOT = 3
; Address of the symbol hash table
DT_HASH = 4
; Address of the dynamic string table (.dynstr)
DT_STRTAB = 5
; Address of the dynamic symbol table (.dynsym)
DT_SYMTAB = 6
; Address of relocation entries with addends
DT_RELA = 7
; Size (in bytes) of DT_RELA entries
DT_RELASZ = 8
; Size (in bytes) of one DT_RELA entry
DT_RELAENT = 9
; Size (in bytes) of the dynamic string table
DT_STRSZ = 10
; Size (in bytes) of one dynamic symbol table entry
DT_SYMENT = 11
; Address of the initialization function
DT_INIT = 12
; Address of the termination function
DT_FINI = 13
; Offset into .dynstr of the shared object name
DT_SONAME = 14
; Offset into .dynstr of the library search path (deprecated in favor of DT_RUNPATH)
DT_RPATH = 15
; Alters symbol resolution for this shared object
DT_SYMBOLIC = 16
; Address of relocation entries without addends (if using REL instead of RELA)
DT_REL = 17
; Size (in bytes) of DT_REL entries
DT_RELSZ = 18
; Size (in bytes) of one DT_REL entry
DT_RELENT = 19
; Type of relocation used for the PLT (DT_REL or DT_RELA)
DT_PLTREL = 20
; Reserved for debugger
DT_DEBUG = 21
; Indicates that relocations modify the text segment
DT_TEXTREL = 22
; Address of relocation entries associated with the PLT
DT_JMPREL = 23
; Instructs immediate symbol binding (disables lazy binding)
DT_BIND_NOW = 24
; Address of the array of initialization function pointers
DT_INIT_ARRAY = 25
; Address of the array of termination function pointers
DT_FINI_ARRAY = 26
; Size (in bytes) of the initialization array
DT_INIT_ARRAYSZ = 27
; Size (in bytes) of the termination array
DT_FINI_ARRAYSZ = 28
; Offset into .dynstr of the library search path (preferred over DT_RPATH)
DT_RUNPATH = 29
; Flags relevant to the object being loaded
DT_FLAGS = 30
; Address of the version dependency table
DT_VERNEED = 0x6FFFFFFE
; Number of version dependencies
DT_VERNEEDNUM = 0x6FFFFFFF
; Address of the version symbol table
DT_VERSYM = 0x6FFFFFF0
; GNU hash 
DT_GNU_HASH = 0x6FFFFEF5